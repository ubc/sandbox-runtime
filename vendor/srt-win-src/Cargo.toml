[package]
name = "srt-win"
version = "0.0.1"
edition = "2024"
publish = false
description = "Windows network sandbox helper for sandbox-runtime"

[lib]
name = "srt_win"
path = "src/lib.rs"

[[bin]]
name = "srt-win"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.62.2", features = [
  "Win32_Foundation",
  "Win32_System_Threading",
  "Win32_System_Memory",
  "Win32_System_Rpc",
  "Win32_System_SystemServices",
  "Win32_System_JobObjects",
  "Win32_System_StationsAndDesktops",
  "Win32_System_Console",
  "Win32_Graphics_Gdi",
  "Win32_Security",
  "Win32_Security_Authorization",
  "Win32_Security_Cryptography",
  "Win32_Storage_FileSystem",
  "Win32_NetworkManagement_WindowsFilteringPlatform",
  "Win32_NetworkManagement_NetManagement",
  "Win32_UI_Shell",
  "Win32_UI_WindowsAndMessaging",
  "Win32_System_Registry",
] }
sha2 = "0.11"
# `bundled` compiles the sqlite3 amalgamation via `cc` — works
# on the Windows runner (MSVC). NOTE: this means
# `cargo check --target x86_64-pc-windows-msvc` from a
# non-Windows host fails at the libsqlite3-sys build script
# (no MSVC toolchain). For local mac-side validation, run
# `cargo check` on the host target (validates clap structs +
# `#[cfg(not(windows))]` main) and rely on the Windows runner
# for the `#![cfg(windows)]` code.
rusqlite = { version = "0.32", features = ["bundled"] }

[profile.release]
opt-level = 2
lto = "thin"
codegen-units = 1
strip = "symbols"
