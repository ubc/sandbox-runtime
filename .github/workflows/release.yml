name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build-seccomp:
    name: Build seccomp (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1
      - run: sudo apt-get update && sudo apt-get install -y gcc libseccomp-dev
      - run: npm run build:seccomp
      - uses: actions/upload-artifact@v4
        with:
          name: seccomp-${{ matrix.arch }}
          path: vendor/seccomp/${{ matrix.arch }}
          if-no-files-found: error

  build-srt-win:
    name: Build srt-win (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: dtolnay/rust-toolchain@stable
      - run: npm run build:srt-win
      - uses: actions/upload-artifact@v4
        with:
          name: srt-win-${{ matrix.arch }}
          path: vendor/srt-win/${{ matrix.arch }}
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: [build-seccomp, build-srt-win]
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tag points to a commit not on main. Refusing to publish unreviewed code."
            exit 1
          fi

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) doesn't match package.json ($PKG_VERSION)"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/download-artifact@v4
        with:
          name: seccomp-x64
          path: vendor/seccomp/x64
      - uses: actions/download-artifact@v4
        with:
          name: seccomp-arm64
          path: vendor/seccomp/arm64
      - run: chmod +x vendor/seccomp/*/apply-seccomp

      - uses: actions/download-artifact@v4
        with:
          name: srt-win-x64
          path: vendor/srt-win/x64
      - uses: actions/download-artifact@v4
        with:
          name: srt-win-arm64
          path: vendor/srt-win/arm64

      - run: npm install
      - run: npm run clean && npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
